enableScripts: true
enableImmutableInstalls: false

nodeLinker: node-modules

# Skip platform-specific binaries (sharp, swc, esbuild, etc.) for OS/CPU
# combinations we don't deploy to. Cuts ~hundreds of MiB off `yarn install`.
# Add entries here if you need to build/run on more platforms.
supportedArchitectures:
  os:
    - "current"
    - "linux"
  cpu:
    - "current"
    - "x64"
    - "arm64"
  libc:
    - "current"
    - "glibc"
    - "musl"
